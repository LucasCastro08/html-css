<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5</title>
</head>
<body>
    <h1>Hospedagem de vídeos</h1>
    <p>Segue abaixo um vdeo hospedado localmente</p>
    <video width="560" poster="imagens/capa-video.png" controls>
        <source src="midia/meu-video-web.webm" type="video/webm">
        <source src="midia/meu-video.mp4" type="video/mp4">
        <p>seu navegagor não é compatível com o formato do vídeo</p>
    </video>
    <p>Segue abaixo um vídeo hospedado do Youtube</p>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/LfaMVlDaQ24?si=ywrIsLj4XwuRhwaX" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
