<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags em HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML 5 podemos usar várias tags. Passe o mouse em cima para mais detalhes.</p>
    <ul>
        <li><abbr title="Use a tag &lt;p>">Parágrafos</abbr></li>
        <li><abbr title="Use a tag &lt;h>">Títulos</abbr></li>
        <li><abbr title="Use a tag &lt;img>">Imagem</abbr></li>
        <li><abbr title="Use a tag &lt;abbr>">Abreviações</abbr></li>
        <li><abbr title="Use a tag &lt;code>">Código Fonte</abbr></li>
        <li><abbr title="Use a tag &lt;ol>">Lista Ordenada</abbr></li>
        <li><abbr title="Use a tag &lt;dl>">Lista com demarcadores</abbr></li>
    </ul>
</body>
</html>
