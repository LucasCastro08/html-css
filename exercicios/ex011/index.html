<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias Adaptaveis</title>
</head>
<body>
    <h1>Mídias adaptaveis</h1>
    <p>Tente aumentar a janela do site</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/pequena.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/media.png" type="image/png">
        <img src="imagens/grande.png" alt="imagem adaptavel">
    </picture>
    <h1>Áudio</h1>
    <p>aperte o play</p>
    <audio controls>
        <source src="midia/Nebula - The Grey Room _ Density & Time.mp3" type="audio/mpeg">
    </audio>
</body>
</html>
