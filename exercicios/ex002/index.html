<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Parágrafos e quebras de linha</h1>
    <hr>
    <p>É possível escrever um parágrafo de qualquer jeito, basta colocar tudo no meio do par de tags p e /p </p>
    <p>Caso preciso quebrar o texto em algum lugar específico <br> como esse, basta usar a tag br.</p>
    <p>Vamos usar alguns símbolos: &nbsp; &copy;</p>
    <p>Vamos usar alguns emojis: &#x1F596;</p> <!--procurar o código no emojipedia-->
</body>
</html>
